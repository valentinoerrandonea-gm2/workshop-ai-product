<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>pizarra</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
<style>
  body { margin:0; }
  .board {
    width: 1200px; height: 800px; position: relative;
    background: #fdfdfb;
    background-image: radial-gradient(circle, rgba(0,0,0,0.025) 1px, transparent 1px);
    background-size: 24px 24px;
    border: 18px solid #8a6d4b; box-sizing: border-box;
    font-family: 'Caveat', cursive; color: #1b3a8f; overflow: hidden;
  }
  .w { position: absolute; line-height: 1.05; white-space: nowrap; }
  .red { color: #b3261e; } .green { color: #1f6e43; }
  .circle {
    position: absolute; border: 4px solid #b3261e; border-radius: 50% / 42%;
    transform: rotate(-3deg);
  }
  .arrow { position: absolute; font-size: 52px; color: #1b3a8f; }
  .smudge { position: absolute; background: rgba(27,58,143,0.06); border-radius: 50%; filter: blur(6px); }
</style>
</head>
<body>
<div class="board">
  <div class="w" style="top:38px; left:60px; font-size:72px; font-weight:700; transform:rotate(-2deg);">TIENDA → ¿¿ESCUELA??</div>
  <div class="w" style="top:150px; left:90px; font-size:44px; transform:rotate(1deg);">la gente no compra componentes…</div>
  <div class="w red" style="top:205px; left:130px; font-size:50px; font-weight:700; transform:rotate(-1deg);">¡compra PROYECTOS!</div>

  <div class="w" style="top:320px; left:70px; font-size:46px; transform:rotate(-2deg);">curso = clases + kit + soporte</div>
  <div class="arrow" style="top:318px; left:560px; transform:rotate(12deg);">⟶</div>
  <div class="w green" style="top:310px; left:640px; font-size:48px; font-weight:700; transform:rotate(2deg);">recurrencia $$</div>

  <div class="w" style="top:430px; left:100px; font-size:54px; font-weight:700; transform:rotate(-1deg);">¿cuántos cursos? ¿3? ¿5?</div>
  <div class="w" style="top:495px; left:160px; font-size:38px; transform:rotate(1deg);">marcos dice 5 — tomi dice "con qué stock?"</div>

  <div class="w" style="top:590px; left:330px; font-size:58px; font-weight:700; transform:rotate(-2deg);">EL KIT VA INCLUIDO</div>
  <div class="circle" style="top:575px; left:300px; width:560px; height:95px;"></div>

  <div class="w" style="top:700px; left:80px; font-size:36px; transform:rotate(-1deg);">⌂ la web actual no sirve para esto → consultora?</div>

  <div class="w red" style="top:60px; right:80px; font-size:40px; transform:rotate(4deg);">NO BORRAR</div>
  <div class="smudge" style="top:260px; left:700px; width:180px; height:60px;"></div>
  <div class="w" style="top:255px; left:710px; font-size:34px; opacity:0.35; transform:rotate(-2deg);">margen 12%??</div>
</div>
</body>
</html>
