  - generic [ref=e51]:
    - article [ref=e52]:
      - generic [ref=e53]: HERO · LED ENCENDIDO MACRO
      - paragraph [ref=e54]: "Si nunca tocaste un Arduino, este es el primer ejercicio que te recomendamos hacer. No porque sea espectacular — un LED parpadeando no le va a impresionar a nadie — sino porque al terminarlo entendés tres cosas que vas a usar en cada proyecto: cómo armar un circuito, cómo escribir y cargar un sketch, y cómo debuggear cuando no funciona (que va a pasar)."
      - heading "Qué necesitás" [level=2] [ref=e55]
      - paragraph [ref=e56]: El kit mínimo es ridículamente barato. Si no tenés nada todavía, mirá la barra de la derecha — están listados los componentes exactos con link directo al carrito.
      - heading "El circuito" [level=2] [ref=e57]
      - paragraph [ref=e58]: "Conectá el ánodo del LED (la pata larga) al pin digital 13 a través de una resistencia de 220Ω. El cátodo (pata corta) va a GND. La resistencia no es opcional: el LED se quema sin ella."
      - generic [ref=e59]: ESQUEMÁTICO · ARDUINO + LED + R
      - heading "El código" [level=2] [ref=e60]
      - paragraph [ref=e61]: "Abrí el Arduino IDE, conectá tu placa por USB, y pegá esto:"
      - generic [ref=e62]: "// Blink — el \"hola mundo\" del hardware const int LED = 13; void setup() { pinMode(LED, OUTPUT); } void loop() { digitalWrite(LED, HIGH); // LED on delay(500); digitalWrite(LED, LOW); // LED off delay(500); }"
      - heading "Por qué funciona" [level=2] [ref=e63]
      - paragraph [ref=e64]:
        - text: Arduino corre
        - code [ref=e65]: setup()
        - text: una vez al arrancar y después
        - code [ref=e66]: loop()
        - text: infinitamente. Cada vuelta del loop pone el pin 13 en alto (5V → enciende el LED), espera medio segundo, lo pone en bajo (0V → apaga), y vuelta. Eso es todo.
      - heading "¿Y si no anda?" [level=2] [ref=e67]
      - paragraph [ref=e68]: "Lo más común: cargaste el sketch en la placa equivocada (revisá Tools → Board → Arduino UNO), o el LED está al revés (las patas son distintas, la corta a GND). Si nada anda, escribinos en el Discord — te ayudamos a debuggear en vivo."
      - heading "Próximos pasos" [level=2] [ref=e69]
      - paragraph [ref=e70]:
        - text: Probá cambiar los
        - code [ref=e71]: delay(500)
        - text: por otros valores. Después agregá un segundo LED. Después intentá controlarlo con un botón. Cuando llegues a "PWM con potenciómetro", releé este post y vas a sentir que pasaron 100 años.
